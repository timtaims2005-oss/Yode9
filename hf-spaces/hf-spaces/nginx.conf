events { worker_connections 1024; }

http {
    server {
        listen 7860;

        location / {
            proxy_pass http://127.0.0.1:7861;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location /api/ {
            proxy_pass http://127.0.0.1:11434/api/;
            proxy_set_header Host $host;
            proxy_read_timeout 300s;
        }
    }
}
