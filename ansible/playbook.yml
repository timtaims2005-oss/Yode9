---
# ══════════════════════════════════════════════════════════
#  MR7.AI — Ansible Deployment Playbook
#  Full server provisioning and application deployment
# ══════════════════════════════════════════════════════════

- name: MR7.AI Infrastructure Setup
  hosts: all
  become: true
  gather_facts: true
  vars:
    project_name: mr7-ai
    app_dir: /opt/mr7-ai
    docker_compose_version: "2.23.3"
    node_version: "20"
    pnpm_version: "9.15.4"

  tasks:
    # ── System Update ─────────────────────────────────────
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade system packages
      apt:
        upgrade: dist
        autoremove: yes
        autoclean: yes

    - name: Install required packages
      apt:
        name:
          - curl
          - wget
          - git
          - build-essential
          - python3-pip
          - certbot
          - nginx
          - ufw
          - fail2ban
          - htop
          - iotop
          - net-tools
          - jq
          - unzip
          - ca-certificates
          - gnupg
          - lsb-release
        state: present

    # ── Docker Installation ───────────────────────────────
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Start and enable Docker
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # ── Node.js Installation ──────────────────────────────
    - name: Add NodeSource repository
      shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      apt:
        name: nodejs
        state: present

    - name: Install pnpm
      shell: |
        npm install -g pnpm@{{ pnpm_version }}
      args:
        creates: /usr/local/bin/pnpm

    # ── Application Setup ─────────────────────────────────
    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Clone repository
      git:
        repo: "{{ git_repo | default('https://github.com/mr7-ai/kaligpt.git') }}"
        dest: "{{ app_dir }}"
        version: "{{ git_branch | default('main') }}"
        force: yes
      become_user: "{{ ansible_user }}"

    - name: Install dependencies
      command: pnpm install --frozen-lockfile
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ ansible_user }}"

    - name: Build applications
      command: pnpm build
      args:
        chdir: "{{ app_dir }}"
      become_user: "{{ ansible_user }}"
      environment:
        NODE_ENV: production

    # ── Environment Configuration ─────────────────────────
    - name: Create .env file
      template:
        src: templates/env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ ansible_user }}"
        mode: "0600"

    # ── Systemd Services ──────────────────────────────────
    - name: Create API server systemd service
      template:
        src: templates/mr7-api.service.j2
        dest: /etc/systemd/system/mr7-api.service
        mode: "0644"

    - name: Create frontend systemd service
      template:
        src: templates/mr7-frontend.service.j2
        dest: /etc/systemd/system/mr7-frontend.service
        mode: "0644"

    - name: Reload systemd
      systemd:
        daemon_reload: yes

    - name: Start and enable services
      systemd:
        name: "{{ item }}"
        state: started
        enabled: yes
      loop:
        - mr7-api
        - mr7-frontend

    # ── Nginx Configuration ───────────────────────────────
    - name: Configure Nginx
      template:
        src: templates/nginx.conf.j2
        dest: /etc/nginx/sites-available/mr7-ai
        mode: "0644"

    - name: Enable Nginx site
      file:
        src: /etc/nginx/sites-available/mr7-ai
        dest: /etc/nginx/sites-enabled/mr7-ai
        state: link

    - name: Remove default Nginx site
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Test and reload Nginx
      block:
        - name: Test Nginx config
          command: nginx -t
        - name: Reload Nginx
          systemd:
            name: nginx
            state: reloaded

    # ── SSL Certificate ───────────────────────────────────
    - name: Obtain SSL certificate
      command: >
        certbot --nginx -d {{ domain }} -d www.{{ domain }}
        --non-interactive --agree-tos --email {{ admin_email }}
      when: domain is defined and admin_email is defined

    # ── Firewall Configuration ────────────────────────────
    - name: Configure UFW
      ufw:
        state: enabled
        policy: deny

    - name: Allow SSH
      ufw:
        rule: allow
        port: "22"
        proto: tcp

    - name: Allow HTTP
      ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS
      ufw:
        rule: allow
        port: "443"
        proto: tcp

    # ── Monitoring Setup ──────────────────────────────────
    - name: Start monitoring stack
      docker_compose:
        project_src: "{{ app_dir }}/infrastructure/docker"
        files:
          - docker-compose.monitoring.yml
        state: present
      become_user: "{{ ansible_user }}"

    # ── Performance Tuning ────────────────────────────────
    - name: Apply performance tuning
      script: "{{ app_dir }}/scripts/tune-performance.sh"
      ignore_errors: yes

    # ── Verification ──────────────────────────────────────
    - name: Wait for API server to be ready
      wait_for:
        port: 8080
        delay: 10
        timeout: 120

    - name: Health check API
      uri:
        url: "http://localhost:8080/api/health"
        method: GET
        return_content: yes
      register: health_check
      retries: 5
      delay: 10
      until: health_check.status == 200

    - name: Display health check result
      debug:
        msg: "API Health: {{ health_check.content }}"

- name: Configure Monitoring Hosts
  hosts: monitoring
  become: true
  tasks:
    - name: Deploy Prometheus + Grafana
      docker_compose:
        project_src: /opt/mr7-ai/infrastructure/docker
        files:
          - docker-compose.monitoring.yml
        state: present

- name: Configure Security Hosts
  hosts: security
  become: true
  tasks:
    - name: Deploy Suricata IDS
      docker_compose:
        project_src: /opt/mr7-ai/infrastructure/docker
        files:
          - docker-compose.security.yml
        state: present
