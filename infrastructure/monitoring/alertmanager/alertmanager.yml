global:
  resolve_timeout: 5m
  smtp_require_tls: true
  smtp_hello: mr7-ai

route:
  group_by: ['alertname', 'service', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h
      continue: true

    - match:
        severity: warning
      receiver: warning
      repeat_interval: 2h

    - match:
        alertname: APIDown
      receiver: critical
      group_wait: 10s
      repeat_interval: 30m

    - match:
        alertname: HighTokenUsage
      receiver: warning
      repeat_interval: 6h

receivers:
  - name: default
    webhook_configs:
      - url: "http://mr7-api:8080/api/webhooks/alerts"
        send_resolved: true
        http_config:
          bearer_token: "${WEBHOOK_TOKEN}"

  - name: critical
    webhook_configs:
      - url: "http://mr7-api:8080/api/webhooks/alerts/critical"
        send_resolved: true

  - name: warning
    webhook_configs:
      - url: "http://mr7-api:8080/api/webhooks/alerts/warning"
        send_resolved: true

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['alertname', 'service']

  - source_match:
      alertname: APIDown
    target_match_re:
      alertname: HighLatency|HighErrorRate
    equal: ['service']
