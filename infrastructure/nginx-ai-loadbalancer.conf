worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time '
                    'backend=$upstream_addr';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 100M;
    client_body_buffer_size 128k;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 16k;

    # ── Compression ──────────────────────────────────────
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript
               application/x-ndjson text/xml application/xml;

    # ── Rate Limiting ────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=ai_global:20m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=ai_chat:10m  rate=20r/m;
    limit_req_zone $binary_remote_addr zone=ai_council:5m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ── Upstream — vLLM ──────────────────────────────────
    upstream vllm_backend {
        least_conn;
        keepalive 32;
        server vllm-server:8000 weight=3 max_fails=3 fail_timeout=30s;
        server vllm-server:8000 backup;
    }

    # ── Upstream — TGI ───────────────────────────────────
    upstream tgi_backend {
        least_conn;
        keepalive 16;
        server tgi-server:80 weight=2 max_fails=3 fail_timeout=30s;
    }

    # ── Upstream — Ollama ─────────────────────────────────
    upstream ollama_backend {
        server ollama:11434 max_fails=2 fail_timeout=15s;
    }

    # ── Upstream — Round Robin All ────────────────────────
    upstream ai_all {
        least_conn;
        keepalive 64;
        server vllm-server:8000 weight=3 max_fails=3 fail_timeout=30s;
        server tgi-server:80   weight=2 max_fails=3 fail_timeout=30s;
        server ollama:11434    weight=1 max_fails=2 fail_timeout=15s;
    }

    # ── Upstream — Main App ───────────────────────────────
    upstream mr7_app {
        server api-server:8080;
        keepalive 16;
    }

    # ── Health Check Server ───────────────────────────────
    server {
        listen 80;
        server_name _;

        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "OK\n";
        }

        location /nginx-status {
            stub_status on;
            allow 127.0.0.1;
            allow 172.0.0.0/8;
            deny all;
        }
    }

    # ── Main AI Load Balancer ─────────────────────────────
    server {
        listen 9000;
        server_name _;

        limit_conn conn_per_ip 10;

        # ── Security Headers ─────────────────────────────
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        add_header Referrer-Policy strict-origin-when-cross-origin;
        add_header X-Powered-By "";

        # ── Proxy Timeouts ───────────────────────────────
        proxy_connect_timeout 5s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
        proxy_buffering off;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;

        # ── vLLM Endpoint ────────────────────────────────
        location /v1/ {
            limit_req zone=ai_chat burst=10 nodelay;
            proxy_pass http://vllm_backend/v1/;
            add_header X-AI-Backend "vllm";
        }

        # ── TGI Endpoint ─────────────────────────────────
        location /tgi/ {
            limit_req zone=ai_chat burst=5 nodelay;
            proxy_pass http://tgi_backend/;
            add_header X-AI-Backend "tgi";
        }

        # ── Ollama Endpoint ───────────────────────────────
        location /ollama/ {
            limit_req zone=ai_chat burst=5 nodelay;
            proxy_pass http://ollama_backend/;
            add_header X-AI-Backend "ollama";
        }

        # ── Auto-Route (best available) ───────────────────
        location /ai/ {
            limit_req zone=ai_global burst=20 nodelay;
            proxy_pass http://ai_all/;
            add_header X-AI-Backend "$upstream_addr";
        }

        # ── SSE Streaming Support ─────────────────────────
        location ~* /stream {
            proxy_pass http://mr7_app;
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection "";
            chunked_transfer_encoding on;
            proxy_read_timeout 600s;
            add_header Cache-Control no-cache;
            add_header X-Accel-Buffering no;
        }
    }
}
