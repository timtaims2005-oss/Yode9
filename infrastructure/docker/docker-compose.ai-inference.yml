version: "3.9"

# ══════════════════════════════════════════════════════════
#  MR7.AI — AI Inference Stack
#  vLLM + Text Generation Inference + TensorRT-LLM
# ══════════════════════════════════════════════════════════

x-gpu-deploy: &gpu-deploy
  resources:
    reservations:
      devices:
        - driver: nvidia
          count: all
          capabilities: [gpu]

x-logging: &default-logging
  logging:
    driver: "json-file"
    options:
      max-size: "100m"
      max-file: "3"

networks:
  ai-inference:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

volumes:
  model-cache:
  vllm-logs:
  tgi-logs:
  tensorrt-logs:

services:
  # ── vLLM Inference Server ─────────────────────────────
  vllm-server:
    image: vllm/vllm-openai:latest
    container_name: mr7-vllm
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - VLLM_MODEL=${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      - VLLM_TENSOR_PARALLEL_SIZE=${TENSOR_PARALLEL:-1}
      - VLLM_GPU_MEMORY_UTILIZATION=0.90
      - VLLM_MAX_MODEL_LEN=32768
      - VLLM_ENABLE_CHUNKED_PREFILL=true
      - VLLM_SPECULATIVE_DECODING=true
      - VLLM_NUM_SPECULATIVE_TOKENS=5
    volumes:
      - model-cache:/root/.cache/huggingface
      - vllm-logs:/var/log/vllm
    ports:
      - "8001:8000"
    command: >
      --model ${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      --tensor-parallel-size ${TENSOR_PARALLEL:-1}
      --gpu-memory-utilization 0.90
      --max-model-len 32768
      --enable-chunked-prefill
      --max-num-seqs 256
      --trust-remote-code
      --served-model-name mr7-local
    deploy:
      <<: *gpu-deploy
    <<: *default-logging
    networks:
      - ai-inference
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ── Text Generation Inference ──────────────────────────
  tgi-server:
    image: ghcr.io/huggingface/text-generation-inference:2.3
    container_name: mr7-tgi
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
      - MODEL_ID=${TGI_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      - NUM_SHARD=${TGI_SHARDS:-1}
      - MAX_INPUT_LENGTH=4096
      - MAX_TOTAL_TOKENS=8192
      - MAX_BATCH_PREFILL_TOKENS=4096
      - WATERMARK_GAMMA=0.25
      - WATERMARK_DELTA=2.0
    volumes:
      - model-cache:/data
      - tgi-logs:/var/log/tgi
    ports:
      - "8002:80"
    command: >
      --model-id ${TGI_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      --num-shard ${TGI_SHARDS:-1}
      --max-input-length 4096
      --max-total-tokens 8192
      --max-batch-prefill-tokens 4096
      --trust-remote-code
    deploy:
      <<: *gpu-deploy
    <<: *default-logging
    networks:
      - ai-inference
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped

  # ── Ollama Local LLM ───────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: mr7-ollama
    environment:
      - OLLAMA_NUM_PARALLEL=4
      - OLLAMA_MAX_QUEUE=100
      - OLLAMA_FLASH_ATTENTION=1
    volumes:
      - model-cache:/root/.ollama
    ports:
      - "11434:11434"
    deploy:
      <<: *gpu-deploy
    <<: *default-logging
    networks:
      - ai-inference
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── AI Load Balancer ───────────────────────────────────
  ai-lb:
    image: nginx:alpine
    container_name: mr7-ai-lb
    volumes:
      - ./nginx-ai-loadbalancer.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "9000:80"
    depends_on:
      - vllm-server
      - tgi-server
      - ollama
    <<: *default-logging
    networks:
      - ai-inference
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped
