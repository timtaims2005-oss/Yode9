version: "3.9"

# ============================================================
# mr7.ai — Production Docker Compose
# Requires all secrets set in environment or a .env.production
#
# Deploy:
#   docker compose -f docker-compose.production.yml up -d --build
#
# NEVER use dev passwords here. All values must come from secrets.
# ============================================================

services:
  # ── API Server ────────────────────────────────────────────
  api:
    build:
      context: ./artifacts/api-server
      dockerfile: Dockerfile
      target: production
    image: mr7ai/api:latest
    container_name: mr7_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mr7_prod_network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Frontend ──────────────────────────────────────────────
  frontend:
    build:
      context: ./artifacts/mr7-ai
      dockerfile: Dockerfile
    image: mr7ai/frontend:latest
    container_name: mr7_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - api
    networks:
      - mr7_prod_network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── Pentest Lab ───────────────────────────────────────────
  pentest-lab:
    build:
      context: ./pentest-lab/backend
      dockerfile: Dockerfile
    image: mr7ai/pentest-lab:latest
    container_name: mr7_pentest_lab
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ENVIRONMENT: production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mr7_prod_network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  # ── PostgreSQL ────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mr7_postgres_prod
    restart: always
    expose:
      - "5432"    # Not exposed to host — only internal network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    networks:
      - mr7_prod_network
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # ── Redis ─────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mr7_redis_prod
    restart: always
    expose:
      - "6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 100
      --loglevel warning
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mr7_prod_network

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: mr7_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - mr7_prod_network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # ── Automated Backup ──────────────────────────────────────
  backup:
    image: prodrigestivill/postgres-backup-local:16
    container_name: mr7_backup
    restart: always
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      SCHEDULE: "@daily"         # Daily at midnight
      BACKUP_KEEP_DAYS: 30
      BACKUP_KEEP_WEEKS: 8
      BACKUP_KEEP_MONTHS: 12
      HEALTHCHECK_PORT: 8080
    volumes:
      - backups_prod:/backups
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mr7_prod_network

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  nginx_logs:
    driver: local
  backups_prod:
    driver: local

networks:
  mr7_prod_network:
    driver: bridge
    name: mr7_prod_network
    ipam:
      config:
        - subnet: 172.20.0.0/16
